job-service.url=http://job
company-service.url=http://company
review-service.url=http://review

spring.application.name=jobms
server.port=8082
# spring.h2.console.enabled = true
# spring.datasource.url = jdbc:h2:mem:test
# spring.jpa.generate-ddl = true
# spring.jpa.show-sql = true

spring.datasource.url=jdbc:postgresql://postgres:5432/jobms
spring.datasource.username=postgres
spring.datasource.password=hdemus
spring.jpa.database=postgresql
spring.jpa.show-sql=true
spring.jpa.hibernate.ddl-auto=update
spring.jpa.database-platform=org.hibernate.dialect.PostgreSQLDialect

#eureka
eureka.client.register-with-eureka=true
eureka.client.fetch-registry=false
# eureka.client.service-url.defaultZone=http://servicereg:8761/eureka/
logging.level.debug=DEBUG
#config-server
# spring.config.import=optional:configserver:${CONFIG_SERVER_URL:http://config-server:8080}

#actuator
management.endpoints.web.exposure.include=*
management.endpoint.health.show-details=always
management.health.circuitbreakers.enabled=false
#resilience4j
resilience4j.circuitbreaker.instances.companyBreaker.slidingWindowSize=10
resilience4j.circuitbreaker.instances.companyBreaker.minimumNumberOfCalls=5
resilience4j.circuitbreaker.instances.companyBreaker.failureRateThreshold=50
resilience4j.circuitbreaker.instances.companyBreaker.waitDurationInOpenState=10s
resilience4j.circuitbreaker.instances.companyBreaker.slidingWindowType=count_based
resilience4j.circuitbreaker.instances.companyBreaker.registerHealthIndicator=true
resilience4j.circuitbreaker.instances.companyBreaker.permitted-number-of-calls-in-half-open-state=3
resilience4j.circuitbreaker.instances.companyBreaker.automatic-transition-from-open-to-half-open-enabled=true
resilience4j.circuitbreaker.instances.companyBreaker.max-attempts=5
resilience4j.circuitbreaker.instances.companyBreaker.wait-duration-in-open-state=2s
resilience4j.ratelimiter.instances.companybreaker.timeout-duration=2s
resilience4j.ratelimiter.instances.companybreaker.limit-refresh-period=10s
resilience4j.ratelimiter.instances.companybreaker.limit-for-period=2
